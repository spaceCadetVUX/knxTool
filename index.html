    </div>
    <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">${si['desc_' + lang] || si.desc_en}</div>
    <div class="sb-label">${t('ga_set_per')}</div>
    ${si.gaNames.map((n, i) => `<div class="ga-set-row">
      <span class="ga-offset">+${i}</span>
      <span class="ga-set-name">${n}</span>
    </div>`).join('')}`;
}

// ── Step 3 — Floors ───────────────────────────────────────────────────────────
function renderStep3() {
  const isChip = state.floorView !== 'tree';
  const isEmpty = state.floors.length === 0;
  const vi = state.lang === 'vi';

  const emptyState = `
  <div class="floors-empty">
    <div class="floors-empty-icon" style="font-size:28px;color:var(--gray-300)">▤</div>
    <p>${vi ? 'Chưa có tầng nào. Bấm "+ Thêm tầng" để bắt đầu.' : 'No floors yet. Click "+ Add floor" to get started.'}</p>
  </div>`;

  return `
  <div class="section-title">${t('step3_title')}</div>
  <div class="section-desc">${t('step3_desc')}</div>

  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <div class="view-toggle">
      <button class="vt-btn ${isChip ? 'active' : ''}" onclick="state.floorView='chip';renderPanel()">${t('chip_view')}</button>
      <button class="vt-btn ${!isChip ? 'active' : ''}" onclick="state.floorView='tree';renderPanel()">${t('tree_view')}</button>
    </div>
  </div>

  ${isEmpty ? emptyState : (isChip
    ? `<div class="floors-list">${state.floors.map((floor, fi) => renderFloorCard(floor, fi)).join('')}</div>`
    : renderFloorTree()
  )}

  <button class="add-floor-btn" onclick="addFloor()" style="margin-top:${isEmpty?'0':'4px'}">
    <span style="font-size:18px;line-height:1">+</span>
    ${t('add_floor')}
  </button>`;
}

function renderFloorCard(floor, fi) {
  const rc = floor.rooms.length;
  const vi = state.lang === 'vi';
  const roomTags = floor.rooms.map((r, ri) => `
    <div class="room-tag" id="chip-${fi}-${ri}">
      <span class="room-tag-text" ondblclick="startRenameRoomChip(${fi},${ri})">${escHtml(r)}</span>
      <button class="room-tag-del" onclick="removeRoom(${fi},${ri})" title="${vi?'Xóa':'Remove'}">×</button>
    </div>`).join('');

  return `
  <div class="floor-card">
    <div class="floor-card-header">
      <span class="mid-badge">M${floor.mid}</span>
      <input class="floor-name-field" value="${escHtml(floor.name)}"
        oninput="state.floors[${fi}].name=this.value;debouncedSave();renderSidebar()"
        title="${vi?'Click để đổi tên':'Click to rename'}" />
      <span class="floor-room-count" id="frc-${fi}">${rc} ${vi?'phòng':rc===1?'room':'rooms'}</span>
      <button class="btn-icon danger btn-sm" onclick="removeFloor(${fi})"
        title="${vi?'Xóa tầng':'Remove floor'}" style="flex-shrink:0">✕</button>
    </div>
    <div class="floor-card-body">
      <div class="room-tags" id="rtags-${fi}">${roomTags}</div>
      <div class="room-add-row">
        <span style="color:var(--teal-400);font-size:16px;line-height:1;flex-shrink:0">+</span>
        <input class="room-add-input" id="room-input-${fi}" type="text"
          placeholder="${vi?'Thêm phòng… (Enter để lưu)':'Add a room… (Enter to save)'}"
          onkeydown="handleRoomKey(event,${fi})" />
        <button class="room-add-btn" onclick="addRoomFromInput(${fi})">${vi?'Thêm':'Add'}</button>
      </div>
    </div>
  </div>`;
}

function renderFloorTree() {
  const vi = state.lang === 'vi';
  return `<div class="tree-list">${state.floors.map((floor, fi) => {
    const rc = floor.rooms.length;
    const isOpen = floor._open !== false; // default expanded
    return `
    <div class="tree-floor-node">
      <div class="tree-floor-hd ${isOpen?'open':''}" onclick="toggleTreeFloor(${fi})">
        <span class="tree-caret ${isOpen?'open':''}">▶</span>
        <span class="mid-badge">M${floor.mid}</span>
        <input class="floor-name-field" value="${escHtml(floor.name)}"
          oninput="state.floors[${fi}].name=this.value;debouncedSave();renderSidebar()"
          onclick="event.stopPropagation()" style="flex:1" />
        <span class="floor-room-count" id="frc-${fi}" style="flex-shrink:0">${rc} ${vi?'phòng':rc===1?'room':'rooms'}</span>
        <button class="btn-icon danger btn-sm" onclick="event.stopPropagation();removeFloor(${fi})"
          title="${vi?'Xóa tầng':'Remove floor'}">✕</button>
      </div>
      ${isOpen ? `
      <div class="tree-floor-body tree-connector">
        ${floor.rooms.map((r, ri) => `
        <div class="tree-room-row" id="troom-${fi}-${ri}">
          <span class="tree-room-name" id="tname-${fi}-${ri}">${escHtml(r)}</span>
          <div class="tree-room-actions">
            <button class="tree-icon-btn" onclick="startRenameRoomTree(${fi},${ri})" title="${vi?'Đổi tên':'Rename'}">✎</button>
            <button class="tree-icon-btn danger" onclick="removeRoom(${fi},${ri})" title="${vi?'Xóa':'Delete'}">✕</button>
          </div>
        </div>`).join('')}
        <div class="tree-add-room">
          <span style="color:var(--teal-400);font-size:14px;line-height:1;flex-shrink:0">+</span>
          <input class="tree-add-room-inp" id="room-input-${fi}" type="text"
            placeholder="${vi?'Thêm phòng… (Enter)':'Add a room… (Enter)'}"
            onkeydown="handleRoomKey(event,${fi})" />
          <button class="room-add-btn" onclick="addRoomFromInput(${fi})">${vi?'Thêm':'Add'}</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function toggleTreeFloor(fi) {
  state.floors[fi]._open = state.floors[fi]._open === false ? true : false;
  renderPanel();
}

// ── Room rename helpers ───────────────────────────────────────────────────────
function startRenameRoomChip(fi, ri) {
  const tag = document.getElementById('chip-' + fi + '-' + ri);
  if (!tag) return;
  const span = tag.querySelector('.room-tag-text');
  if (!span) return;
  const cur = state.floors[fi].rooms[ri];
  tag.classList.add('editing');
  const inp = document.createElement('input');
  inp.className = 'room-tag-rename';
  inp.value = cur;
  inp.style.width = Math.max(50, cur.length * 8) + 'px';
  span.replaceWith(inp);
  inp.focus(); inp.select();
  function commit() {
    const v = inp.value.trim();
    if (v && v !== cur) { state.floors[fi].rooms[ri] = v; saveState(); renderSidebar(); }
    const s = document.createElement('span');
    s.className = 'room-tag-text';
    s.textContent = v || cur;
    s.setAttribute('ondblclick', `startRenameRoomChip(${fi},${ri})`);
    inp.replaceWith(s);
    tag.classList.remove('editing');
  }
  inp.onblur = commit;
  inp.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = cur; inp.blur(); }
  };
}

function startRenameRoomTree(fi, ri) {
  const nameEl = document.getElementById('tname-' + fi + '-' + ri);
  if (!nameEl) return;
  const cur = state.floors[fi].rooms[ri];
  const inp = document.createElement('input');
  inp.className = 'tree-room-rename-inp';
  inp.value = cur;
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();
  function commit() {
    const v = inp.value.trim();
    if (v && v !== cur) { state.floors[fi].rooms[ri] = v; saveState(); renderSidebar(); }
    const s = document.createElement('span');
    s.className = 'tree-room-name';
    s.id = 'tname-' + fi + '-' + ri;
    s.textContent = v || cur;
    inp.replaceWith(s);
  }
  inp.onblur = commit;
  inp.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = cur; inp.blur(); }
  };
}

function handleRoomKey(e, fi) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addRoomFromInput(fi);
  }
  if (e.key === 'Escape') {
    e.target.value = '';
    e.target.blur();
  }
}

function addRoomFromInput(fi) {
  const inp = document.getElementById('room-input-' + fi);
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  state.floors[fi].rooms.push(name);
  inp.value = '';
  inp.focus();
  // Full panel re-render is needed (tree inserts new row; chip re-indexes IDs)
  renderPanel();
  renderSidebar();
  saveState();
  // Restore focus to input after re-render
  setTimeout(() => { const el = document.getElementById('room-input-' + fi); if (el) el.focus(); }, 20);
}

function removeRoom(fi, ri) {
  state.floors[fi].rooms.splice(ri, 1);
  renderPanel();
  renderSidebar();
  saveState();
}

function addFloor() {
  const usedMids = new Set(state.floors.map(f => f.mid));
  let nextMid = 1;
  while (usedMids.has(nextMid) && nextMid <= 7) nextMid++;
  if (nextMid > 7) { showToast(state.lang === 'vi' ? 'Tối đa 7 tầng (M1–M7)' : 'Maximum 7 floors (M1–M7)', true); return; }
  state.floors.push({ id:'f'+nextMid, mid:nextMid, name: (state.lang === 'vi' ? 'Tầng ' : 'Floor ') + nextMid, rooms:[] });
  renderPanel();
  renderSidebar();
  saveState();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.floor-name-field');
    if (inputs.length) inputs[inputs.length - 1].select();
  }, 50);
}

function removeFloor(fi) {
  if (state.floors[fi].rooms.length > 0) {
    if (!confirm((state.lang === 'vi'
      ? `Xóa tầng "${state.floors[fi].name}" và ${state.floors[fi].rooms.length} phòng?`
      : `Remove "${state.floors[fi].name}" and its ${state.floors[fi].rooms.length} room(s)?`))) return;
  }
  state.floors.splice(fi, 1);
  renderPanel();
  renderSidebar();
  saveState();
}

function removeRoom(fi, ri) {
  state.floors[fi].rooms.splice(ri, 1);
  // Re-render just the room tags without full panel refresh
  const isFixed = state.floors[fi].fixed;
  const tagsEl  = document.getElementById('rtags-' + fi);
  const cntEl   = document.getElementById('frc-' + fi);
  if (tagsEl) {
    tagsEl.innerHTML = state.floors[fi].rooms.map((r, ri2) => `
      <div class="room-tag ${isFixed ? 'fixed-room' : ''}">
        ${escHtml(r)}
        ${!isFixed ? `<button class="room-tag-del" onclick="removeRoom(${fi},${ri2})" title="Remove">×</button>` : ''}
      </div>`).join('');
  }
  if (cntEl) {
    const c = state.floors[fi].rooms.length;
    cntEl.textContent = c + ' ' + (state.lang === 'vi' ? 'phòng' : c === 1 ? 'room' : 'rooms');
  }
  renderSidebar();
  saveState();
}

// ── Step 4 — Quantities ───────────────────────────────────────────────────────
let assignFloor = 0;
let assignRoom  = 0;

function renderStep4() {
  const sysList = Object.keys(state.systems).filter(k => state.systems[k]);
  const vi = state.lang === 'vi';

  if (state.floors.length === 0) return `
    <div class="section-title">${t('step4_title')}</div>
    <div class="section-desc">${t('step4_desc')}</div>
    <div style="padding:40px;text-align:center;color:var(--gray-400);font-size:13px;border:1px dashed var(--gray-200);border-radius:var(--radius)">
      ${vi ? 'Chưa có tầng nào. Quay lại bước Tầng & Phòng để thêm.' : 'No floors defined. Go back to Floors & Rooms to add some.'}
    </div>`;

  // Clamp assignFloor if floors changed
  if (assignFloor >= state.floors.length) assignFloor = 0;
  const floor = state.floors[assignFloor];
  const validRooms = (floor.rooms || []);
  if (assignRoom >= validRooms.length) assignRoom = 0;

  function floorTotal(fi) {
    const fl = state.floors[fi];
    return (fl.rooms || []).reduce((a, _, ri) =>
      a + sysList.reduce((b, sk) =>
        b + activeDefs(sk).reduce((c, [ck]) => c + getQty(fi, ri, sk, ck), 0), 0), 0);
  }

  function roomTotal(fi, ri) {
    return sysList.reduce((a, sk) =>
      a + activeDefs(sk).reduce((b, [ck]) => b + getQty(fi, ri, sk, ck), 0), 0);
  }

  function renderRoomQty(fi, ri) {
    return sysList.map(sk => {
      const si    = sysInfo[sk];
      const cdefs = activeDefs(sk);
      const sysTotal = cdefs.reduce((a, [ck]) => a + getQty(fi, ri, sk, ck), 0);
      return `
      <div class="sys-section-head">
        <div class="sys-section-icon">
          <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${sysIconSvg[si.icon]}</svg>
        </div>
        <span class="sys-section-label">${si['name_' + state.lang] || si.name_en}</span>
        <span class="qty-sum-badge ${sysTotal === 0 ? 'zero' : ''}">${sysTotal === 0 ? (state.lang === 'vi' ? 'chưa có' : 'none') : sysTotal + ' unit' + (sysTotal > 1 ? 's' : '')}</span>
      </div>
      <table class="qty-table" style="margin-bottom:8px">
        <thead><tr>
          <th style="width:160px">${state.lang === 'vi' ? 'Loại mạch' : 'Circuit type'}</th>
          <th>${state.lang === 'vi' ? 'Số lượng' : 'Quantity'}</th>
        </tr></thead>
        <tbody>
          ${cdefs.map(([ck, clabel]) => {
            const qty = getQty(fi, ri, sk, ck);
            return `<tr>
              <td>${clabel}</td>
              <td>
                <div class="qty-stepper">
                  <button class="qty-stepper-btn" onclick="adjQty(${fi},${ri},'${sk}','${ck}',-1)">−</button>
                  <input class="qty-input" type="number" min="0" max="99" value="${qty}"
                    onchange="setQty(${fi},${ri},'${sk}','${ck}',this.value);renderPanel()"
                    onblur="setQty(${fi},${ri},'${sk}','${ck}',this.value);renderPanel()" />
                  <button class="qty-stepper-btn" onclick="adjQty(${fi},${ri},'${sk}','${ck}',1)">+</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    }).join('');
  }

  return `
  <div class="section-title">${t('step4_title')}</div>
  <div class="section-desc">${t('step4_desc')}</div>

  <div class="assign-layout">
    <div class="assign-left">
      ${state.floors.map((f, fi) => {
        const ft = floorTotal(fi);
        return `<button class="assign-floor-btn ${fi === assignFloor ? 'active' : ''}"
          onclick="assignFloor=${fi};assignRoom=0;renderPanel()">
          <span class="mid-badge">M${f.mid}</span>
          <span style="flex:1">${escHtml(f.name)}</span>
          ${ft > 0 ? `<span style="font-size:10px;color:var(--teal-500);font-weight:700">${ft}</span>` : ''}
        </button>`;
      }).join('')}
    </div>

    <div>
      <div class="room-tab-bar">
        ${validRooms.length === 0
          ? `<span style="font-size:13px;color:var(--gray-400)">${t('no_rooms')}</span>`
          : validRooms.map((room, ri) => {
              const rt = roomTotal(assignFloor, ri);
              return `<button class="room-tab ${ri === assignRoom ? 'active' : ''}"
                onclick="assignRoom=${ri};renderPanel()">
                ${escHtml(room)}${rt > 0 ? ` <span style="font-size:10px;color:var(--teal-500)">(${rt})</span>` : ''}
              </button>`;
            }).join('')}
      </div>
      <div class="room-qty-area">
        ${validRooms.length === 0
          ? `<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">${t('no_rooms')}</div>`
          : (sysList.length === 0
            ? `<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">${state.lang === 'vi' ? 'Chưa chọn hệ thống nào.' : 'No systems selected.'}</div>`
            : renderRoomQty(assignFloor, assignRoom))}
      </div>
    </div>
  </div>`;
}

// ── Step 5 — Generate & Review ────────────────────────────────────────────────
function renderStep5() {
  const gas      = state.generatedGAs;
  const total    = gas.length;
  const ctrlCnt  = gas.filter(g => g.type === 'ctrl').length;
  const fbCnt    = gas.filter(g => g.type === 'fb').length;
  const mainCnt  = new Set(gas.map(g => g.main)).size;
  const sysList  = Object.keys(state.systems).filter(k => state.systems[k]);
  const isTree   = state.gaView === 'tree';

  const filtered = state.gaFilter === 'all'
    ? gas
    : gas.filter(g => { const si = sysInfo[state.gaFilter]; return si && g.main === si.main; });

  // Main opts for add-GA form
  const mainOpts = sysList.map(sk => {
    const si = sysInfo[sk];
    return `<option value="${si.main}">${si.main} — ${si['name_' + state.lang] || si.name_en}</option>`;
  }).join('');
  const midOpts = state.floors.map(f =>
    `<option value="${f.mid}">${f.mid} — ${escHtml(f.name)}</option>`).join('');

  return `
  <div class="section-title">${t('step5_title')}</div>
  <div class="section-desc">${t('step5_desc')}</div>

  <div class="stat-bar" style="margin-bottom:16px">
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">${t('total_gas')}</div></div>
    <div class="stat-card"><div class="val">${mainCnt}</div><div class="lbl">${t('main_groups')}</div></div>
    <div class="stat-card"><div class="val">${state.floors.length}</div><div class="lbl">${t('floors')}</div></div>
  </div>

  <div class="ga-toolbar" style="margin-bottom:12px">
    <div class="filter-chips">
      <div class="chip ${state.gaFilter === 'all' ? 'active' : ''}" onclick="state.gaFilter='all';renderPanel()">${t('all_filter')} (${total})</div>
      ${sysList.map(sk => {
        const si  = sysInfo[sk];
        const cnt = gas.filter(g => g.main === si.main).length;
        return `<div class="chip ${state.gaFilter === sk ? 'active' : ''}" onclick="state.gaFilter='${sk}';renderPanel()">${si['name_' + state.lang] || si.name_en} (${cnt})</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
      <div class="view-toggle">
        <button class="vt-btn ${isTree ? 'active' : ''}" onclick="state.gaView='tree';renderPanel()">Tree</button>
        <button class="vt-btn ${!isTree ? 'active' : ''}" onclick="state.gaView='table';renderPanel()">Table</button>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="openImportModal()">${t('import_xml')}</button>
      <button class="btn btn-secondary btn-sm" onclick="callGenerate()">${t('regenerate')}</button>
    </div>
  </div>

  ${total === 0
    ? `<div class="card" style="text-align:center;padding:40px;color:var(--gray-400)">${t('no_gas')}</div>`
    : (isTree ? renderGaTree(filtered) : renderGaTable(filtered))
  }

  <div class="card mt-4">
    <div class="card-header">
      <div class="card-title">${t('add_ga_manual')}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="margin:0">
        <label class="field-label">Main</label>
        <select class="input input-sm" id="add-main" style="width:140px">${mainOpts}</select>
      </div>
      <div class="field" style="margin:0">
        <label class="field-label">Middle</label>
        <select class="input input-sm" id="add-mid" style="width:140px">${midOpts}</select>
      </div>
      <div class="field" style="margin:0">
        <label class="field-label">Sub (0–255)</label>
        <input class="input input-sm" id="add-sub" type="number" min="0" max="255" placeholder="0" style="width:80px" />
      </div>
      <div class="field" style="margin:0;flex:1;min-width:180px">
        <label class="field-label">${state.lang === 'vi' ? 'Tên GA' : 'GA name'}</label>
        <input class="input input-sm" id="add-name" type="text" placeholder="e.g. LT - GF - Custom - SW" />
      </div>
      <div class="field" style="margin:0">
        <label class="field-label">DPT</label>
        <select class="input input-sm" id="add-dpt" style="width:130px">
          <option value="DPST-1-001">DPST-1-001 (1-bit)</option>
          <option value="DPST-3-007">DPST-3-007 (4-bit)</option>
          <option value="DPST-5-001">DPST-5-001 (1-byte)</option>
          <option value="DPST-9-001">DPST-9-001 (2-byte float)</option>
          <option value="DPST-18-001">DPST-18-001 (scene)</option>
          <option value="DPST-232-600">DPST-232-600 (RGB)</option>
        </select>
      </div>
      <div class="field" style="margin:0">
        <label class="field-label">${state.lang === 'vi' ? 'Loại' : 'Type'}</label>
        <select class="input input-sm" id="add-type" style="width:100px">
          <option value="ctrl">control</option>
          <option value="fb">feedback</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addManualGA()">+ ${t('add_ga')}</button>
    </div>
  </div>`;
}

function renderGaTree(filtered) {
  const mainGroups = {};
  filtered.forEach(g => {
    if (!mainGroups[g.main]) mainGroups[g.main] = { name: g.mainName, mids: {} };
    if (!mainGroups[g.main].mids[g.mid]) {
      const fl = state.floors.find(f => f.mid === g.mid);
      mainGroups[g.main].mids[g.mid] = { name: fl ? fl.name : 'Zone', gas: [] };
    }
    mainGroups[g.main].mids[g.mid].gas.push(g);
  });

  if (!Object.keys(mainGroups).length) return `<div class="card" style="padding:32px;text-align:center;color:var(--gray-400)">${t('no_gas')}</div>`;

  return Object.entries(mainGroups).map(([mn, mg]) => {
    const total = Object.values(mg.mids).reduce((a, m) => a + m.gas.length, 0);
    return `
    <div style="margin-bottom:8px">
      <div class="ga-main-row" onclick="toggleBlock('gm-${mn}')">
        <span style="font-family:var(--font-mono);font-size:11px;opacity:.6">${mn}</span>
        <span class="ga-main-name">${mg.name}</span>
        <span class="badge badge-teal" style="margin-left:auto">${total} GAs</span>
        <span style="margin-left:8px;opacity:.5;font-size:12px" id="arr-gm-${mn}">▼</span>
      </div>
      <div id="gm-${mn}">
        ${Object.entries(mg.mids).map(([mid, mm]) => `
        <div style="margin-bottom:4px">
          <div class="ga-mid-row" onclick="toggleBlock('gmid-${mn}-${mid}')">
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--gray-400)">${mn}/${mid}</span>
            <span class="ga-mid-name">${escHtml(mm.name)}</span>
            <span class="badge badge-gray" style="margin-left:auto">${mm.gas.length}</span>
            <span style="margin-left:8px;opacity:.4;font-size:11px" id="arr-gmid-${mn}-${mid}">▼</span>
          </div>
          <div id="gmid-${mn}-${mid}">
            ${mm.gas.map(g => gaRow(g)).join('')}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderGaTable(filtered) {
  return `<div class="ga-table-wrap">
    <table class="ga-table">
      <thead><tr>
        <th style="width:72px">${state.lang === 'vi' ? 'Địa chỉ' : 'Address'}</th>
        <th>${state.lang === 'vi' ? 'Tên' : 'Name'}</th>
        <th style="width:120px">DPT</th>
        <th style="width:60px">${state.lang === 'vi' ? 'Loại' : 'Type'}</th>
        <th style="width:32px"></th>
      </tr></thead>
      <tbody>${filtered.map(g => `<tr>
        <td style="font-family:var(--font-mono);color:var(--teal-700);font-weight:500">${g.addr}</td>
        <td>
          <span class="ga-name-text" onclick="startGaEdit(this)">${escHtml(g.name)}</span>
          <input class="input-inline ga-name-input" data-addr="${g.addr}"
            onblur="stopGaEdit(this)" onkeydown="keyGaEdit(event,this)" />
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--gray-400)">${g.dpt}</td>
        <td><span class="badge ${g.type === 'ctrl' ? 'badge-teal' : 'badge-gray'}">${g.type === 'ctrl' ? t('ctrl_short') : t('fb_short')}</span></td>
        <td><button class="btn-icon danger" onclick="deleteGA('${g.addr}')">✕</button></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function gaRow(g) {
  return `<div class="ga-row">
    <span class="addr">${g.addr}</span>
    <span class="ga-name-text name" onclick="startGaEdit(this)">${escHtml(g.name)}</span>
    <input class="input-inline ga-name-input name" data-addr="${g.addr}"
      onblur="stopGaEdit(this)" onkeydown="keyGaEdit(event,this)" />
    <span class="dpt">${g.dpt}</span>
    <span class="type badge ${g.type === 'ctrl' ? 'badge-teal' : 'badge-gray'}">${g.type === 'ctrl' ? t('ctrl_short') : t('fb_short')}</span>
    <span class="actions">
      <button class="btn-icon danger btn-xs" onclick="deleteGA('${g.addr}')">✕</button>
    </span>
  </div>`;
}

function toggleBlock(id) {
  const el  = document.getElementById(id);
  const arr = document.getElementById('arr-' + id);
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display  = hidden ? '' : 'none';
  if (arr) arr.textContent = hidden ? '▼' : '▶';
}

function startGaEdit(el) {
  const inp = el.nextElementSibling;
  inp.value = el.textContent;
  el.style.display  = 'none';
  inp.style.display = 'block';
  inp.focus(); inp.select();
}

function stopGaEdit(inp) {
  const text = inp.previousElementSibling;
  const addr = inp.getAttribute('data-addr');
  const val  = inp.value.trim();
  if (val) {
    text.textContent = val;
    const ga = state.generatedGAs.find(g => g.addr === addr);
    if (ga) { ga.name = val; debouncedSave(); }
  }
  inp.style.display  = 'none';
  text.style.display = '';
}

function keyGaEdit(e, inp) {
  if (e.key === 'Enter')  inp.blur();
  if (e.key === 'Escape') { inp.value = ''; inp.blur(); }
}

function deleteGA(addr) {
  if (!confirm((state.lang === 'vi' ? 'Xóa GA ' : 'Delete GA ') + addr + '?')) return;
  state.generatedGAs = state.generatedGAs.filter(g => g.addr !== addr);
  state.manualGAs    = state.manualGAs.filter(g => g.addr !== addr);
  renderPanel();
  renderSidebar();
  saveState();
}

function addManualGA() {
  const main = parseInt(document.getElementById('add-main').value) || 1;
  const mid  = parseInt(document.getElementById('add-mid').value)  || 0;
  const sub  = parseInt(document.getElementById('add-sub').value);
  const name = (document.getElementById('add-name').value || '').trim();
  const dpt  = document.getElementById('add-dpt').value;
  const type = document.getElementById('add-type').value;

  if (isNaN(sub) || sub < 0 || sub > 255) {
    showToast(state.lang === 'vi' ? 'Sub group phải từ 0–255' : 'Sub group must be 0–255', true); return;
  }
  if (!name) {
    showToast(state.lang === 'vi' ? 'Vui lòng nhập tên GA' : 'Please enter a GA name', true); return;
  }
  const addr = `${main}/${mid}/${sub}`;
  if (state.generatedGAs.find(g => g.addr === addr)) {
    if (!confirm((state.lang === 'vi' ? 'Địa chỉ ' : 'Address ') + addr + (state.lang === 'vi' ? ' đã tồn tại. Ghi đè?' : ' already exists. Overwrite?'))) return;
    state.generatedGAs = state.generatedGAs.filter(g => g.addr !== addr);
    state.manualGAs    = state.manualGAs.filter(g => g.addr !== addr);
  }
  const skEntry = Object.keys(sysInfo).find(k => sysInfo[k].main === main);
  const newGA = { addr, name, dpt, type, main, mid, mainName: skEntry ? sysInfo[skEntry].name_en : 'Custom', manual: true };
  state.generatedGAs.push(newGA);
  state.manualGAs.push({ ...newGA });
  state.generatedGAs.sort((a, b) => {
    const ap = a.addr.split('/').map(Number), bp = b.addr.split('/').map(Number);
    for (let i = 0; i < 3; i++) { if (ap[i] !== bp[i]) return ap[i] - bp[i]; } return 0;
  });
  renderPanel();
  renderSidebar();
  saveState();
}

// ── Step 6 — Export ────────────────────────────────────────────────────────────
function renderStep6() {
  const gas     = state.generatedGAs;
  const sysList = Object.keys(state.systems).filter(k => state.systems[k]);
  const defName = (state.projectName || 'KNX_Project').replace(/\s+/g, '_') + '_GA';

  return `
  <div class="section-title">${t('step6_title')}</div>
  <div class="section-desc">${t('step6_desc')}</div>

  <div class="export-layout">
    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:10px">${t('project_summary')}</div>
        <div class="sb-info-row"><span>${state.lang === 'vi' ? 'Dự án' : 'Project'}</span><strong>${escHtml(state.projectName || '—')}</strong></div>
        <div class="sb-info-row"><span>${state.lang === 'vi' ? 'Cấu trúc' : 'Structure'}</span><strong>${state.structure === 'function' ? t('function_based') : t('building_based')}</strong></div>
        <div class="sb-info-row"><span>${t('total_gas')}</span><strong style="color:var(--teal-600)">${gas.length}</strong></div>
        <div class="sb-info-row"><span>${t('main_groups')}</span><strong>${sysList.length}</strong></div>
        <div class="sb-info-row"><span>${t('floors')}</span><strong>${state.floors.length}</strong></div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:10px">${t('export_format')}</div>
        <div class="format-selector">
          <div class="format-btn ${state.exportFormat === 'xml' ? 'active' : ''}" onclick="state.exportFormat='xml';renderPanel()">XML</div>
          <div class="format-btn ${state.exportFormat === 'csv' ? 'active' : ''}" onclick="state.exportFormat='csv';renderPanel()">CSV</div>
        </div>
        <div style="font-size:12px;color:var(--gray-500)">
          ${state.exportFormat === 'xml' ? t('xml_desc') : t('csv_desc')}
        </div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:10px">${t('options')}</div>
        ${[['dpt', t('include_dpt')], ['desc', t('include_desc')], ['unused', t('include_unused')], ['floorFirst', t('group_floor')]].map(([k, l]) => `
        <div class="toggle-row">
          <span class="toggle-label">${l}</span>
          <label class="toggle">
            <input type="checkbox" ${state.exportOpts[k] ? 'checked' : ''}
              onchange="state.exportOpts['${k}']=this.checked;refreshPreview()" />
            <span class="toggle-slider"></span>
          </label>
        </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:8px">${t('filename')}</div>
        <input class="input input-sm" id="filename-input" value="${escHtml(defName)}" />
        <div style="font-size:11px;color:var(--gray-400);margin-top:4px">.${state.exportFormat} ${state.lang === 'vi' ? 'sẽ được thêm vào' : 'will be appended'}</div>
        <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="callExportXML()">${t('download_xml')}</button>
          <button class="btn btn-secondary" onclick="callExportCSV()">${t('export_csv')}</button>
        </div>
      </div>
    </div>

    <div>
      <div class="preview-toolbar">
        <span class="preview-title">${t('xml_preview')}</span>
        <button class="btn btn-secondary btn-sm" id="btn-copy-preview" onclick="copyPreview()">${t('copy_clipboard')}</button>
      </div>
      <div class="xml-preview" id="xml-preview-pane">
        <span style="color:var(--gray-500)">${gas.length === 0
          ? (state.lang === 'vi' ? 'Chưa có GA nào để hiển thị.' : 'No GAs to preview.')
          : (state.lang === 'vi' ? 'Đang tải...' : 'Loading preview…')
        }</span>
      </div>
    </div>
  </div>`;
}

function refreshPreview() {
  if (state.step !== 6) return;
  loadXmlPreview();
}

async function loadXmlPreview() {
  const pane = document.getElementById('xml-preview-pane');
  if (!pane || !state.generatedGAs.length) return;
  try {
    const res = await fetch('/api/export/xml', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gas: state.generatedGAs,
        opts: {
          projectName: state.projectName,
          floors:      state.floors,
          includeDpt:  state.exportOpts.dpt,
          includeDesc: state.exportOpts.desc
        }
      })
    });
    if (!res.ok) throw new Error((await res.json()).error);
    const xml = await res.text();
    state._xmlCache = xml;
    pane.innerHTML = syntaxHighlight(xml);
  } catch (e) {
    if (pane) pane.innerHTML = `<span style="color:#f87171">${escHtml(e.message)}</span>`;
  }
}

function syntaxHighlight(xml) {
  return escHtml(xml)
    .replace(/(&lt;\/?[\w:-]+)/g,  '<span class="tag">$1</span>')
    .replace(/([\w-]+=)/g,         '<span class="attr">$1</span>')
    .replace(/="([^"]*)"/g,        '="<span class="val">$1</span>"')
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="cmt">$1</span>');
}

function copyPreview() {
  const content = state._xmlCache || '';
  if (!content) return;
  navigator.clipboard && navigator.clipboard.writeText(content).then(() => {
    const btn = document.getElementById('btn-copy-preview');
    if (btn) { const orig = btn.textContent; btn.textContent = t('copied'); setTimeout(() => btn.textContent = orig, 1800); }
  });
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function callGenerate() {
  showLoading(state.lang === 'vi' ? 'Đang tạo GA…' : 'Generating GAs…');
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        structure:  state.structure,
        floors:     state.floors,
        systems:    state.systems,
        quantities: state.quantities,
        manualGAs:  state.manualGAs,
        ltSubs:     state.ltSubs,
        hvacSubs:   state.hvacSubs
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Generate failed');
    state.generatedGAs = data.gas;
    renderPanel();
    renderSidebar();
    saveState();
    showToast((state.lang === 'vi' ? `${data.count} GA đã tạo` : `${data.count} GAs generated`));
  } catch (e) {
    showToast(e.message, true);
  } finally {
    hideLoading();
  }
}

async function callExportXML() {
  if (!state.generatedGAs.length) { showToast(state.lang === 'vi' ? 'Chưa có GA nào' : 'No GAs to export', true); return; }
  showLoading(state.lang === 'vi' ? 'Đang xuất XML…' : 'Building XML…');
  try {
    const fname = (document.getElementById('filename-input')?.value || 'KNX_GA').trim();
    const res = await fetch('/api/export/xml', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gas: state.generatedGAs,
        opts: {
          projectName: state.projectName,
          floors:      state.floors,
          includeDpt:  state.exportOpts.dpt,
          includeDesc: state.exportOpts.desc
        }
      })
    });
    if (!res.ok) throw new Error((await res.json()).error);
    const xml = await res.text();
    triggerDownload(xml, fname + '.xml', 'application/xml');
    showToast(t('file_ready'));
  } catch (e) {
    showToast(e.message, true);
  } finally {
    hideLoading();
  }
}

async function callExportCSV() {
  if (!state.generatedGAs.length) { showToast(state.lang === 'vi' ? 'Chưa có GA nào' : 'No GAs to export', true); return; }
  showLoading(state.lang === 'vi' ? 'Đang xuất CSV…' : 'Building CSV…');
  try {
    const fname = (document.getElementById('filename-input')?.value || 'KNX_GA').trim();
    const res = await fetch('/api/export/csv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gas:  state.generatedGAs,
        opts: { floors: state.floors }
      })
    });
    if (!res.ok) throw new Error((await res.json()).error);
    const csv = await res.text();
    triggerDownload(csv, fname + '.csv', 'text/plain');
    showToast(t('file_ready'));
  } catch (e) {
    showToast(e.message, true);
  } finally {
    hideLoading();
  }
}

async function callImportXML(rawStr) {
  showLoading(state.lang === 'vi' ? 'Đang nhập XML…' : 'Importing XML…');
  try {
    const res = await fetch('/api/import/xml', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ xml: rawStr })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    let merged = 0;
    data.gas.forEach(ig => {
      const existing = state.generatedGAs.find(g => g.addr === ig.addr);
      if (existing) { existing.name = ig.name; }
      else { state.generatedGAs.push(ig); merged++; }
    });
    state.generatedGAs.sort((a, b) => {
      const ap = a.addr.split('/').map(Number), bp = b.addr.split('/').map(Number);
      for (let i = 0; i < 3; i++) { if (ap[i] !== bp[i]) return ap[i] - bp[i]; } return 0;
    });
    closeImportModal();
    showToast((state.lang === 'vi' ? `Import: ${data.count} GA đã gộp` : `Import: ${data.count} GAs merged`));
    renderPanel();
    renderSidebar();
    saveState();
  } catch (e) {
    showToast(e.message, true);
  } finally {
    hideLoading();
  }
}

// ── Import modal ──────────────────────────────────────────────────────────────
function openImportModal() {
  state.importedXml = null;
  const btn = document.getElementById('btn-confirm-import');
  if (btn) { btn.disabled = true; }
  document.getElementById('drop-zone-text').textContent = t('drop_here');
  document.getElementById('import-modal').classList.remove('hidden');
  document.getElementById('modal-title-import').textContent = t('import_xml');
  document.getElementById('btn-cancel-import').textContent = t('cancel');
  // Wire file input
  const fi = document.getElementById('file-input');
  fi.onchange = function () { handleXmlFile(this); };
  // Wire drop zone drag/drop
  const dz = document.getElementById('drop-zone');
  dz.ondragover  = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop      = e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) readXmlFile(f);
  };
  // Wire confirm
  document.getElementById('btn-confirm-import').onclick = () => {
    if (state.importedXml) callImportXML(state.importedXml);
  };
}

function closeImportModal() {
  document.getElementById('import-modal').classList.add('hidden');
  state.importedXml = null;
}

function handleXmlFile(input) {
  const f = input.files[0];
  if (f) readXmlFile(f);
}

function readXmlFile(f) {
  const reader = new FileReader();
  reader.onload = e => {
    state.importedXml = e.target.result;
    const dzt = document.getElementById('drop-zone-text');
    const btn = document.getElementById('btn-confirm-import');
    if (dzt) dzt.textContent = '✓ ' + f.name;
    if (btn) btn.disabled = false;
  };
  reader.readAsText(f);
}

// ── Loading overlay ───────────────────────────────────────────────────────────
function showLoading(msg) {
  const el = document.getElementById('loading-overlay');
  const lm = document.getElementById('loading-msg');
  if (lm) lm.textContent = msg || '';
  if (el) el.classList.remove('hidden');
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.classList.add('hidden');
}

function triggerDownload(content, filename, mime) {
  const a = document.createElement('a');
  a.href     = 'data:' + mime + ';charset=utf-8,' + encodeURIComponent(content);
  a.download = filename;
  a.click();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function updateHeaderProject() {
  const hp = document.getElementById('header-project');
  const hn = document.getElementById('header-project-name');
  if (state.projectName) { hp.style.display = ''; hn.textContent = state.projectName; }
  else { hp.style.display = 'none'; }
  debouncedSave();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' toast-error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}

// ── localStorage persistence ──────────────────────────────────────────────────
const STORAGE_KEY = 'knx_ga_planner_v1';
const PERSIST_FIELDS = ['projectName','structure','systems','ltSubs','hvacSubs',
  'floors','quantities','generatedGAs','manualGAs','exportFormat','exportOpts','lang'];

function saveState() {
  try {
    const payload = {};
    PERSIST_FIELDS.forEach(k => { payload[k] = state[k]; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    // flash save indicator
    const el = document.getElementById('save-indicator');
    if (el) { el.classList.add('saved'); clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('saved'), 1500); }
  } catch(e) { /* private mode or quota exceeded — silent fail */ }
}

let _saveTimer = null;
function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveState, 600);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    PERSIST_FIELDS.forEach(k => { if (saved[k] !== undefined) state[k] = saved[k]; });
    return true;
  } catch(e) { return false; }
}

function newProject() {
  const hasData = state.projectName || state.generatedGAs.length > 0 ||
    Object.values(state.quantities).length > 0;
  if (hasData) {
    if (!confirm(state.lang === 'vi'
      ? 'Bắt đầu dự án mới? Dữ liệu hiện tại sẽ bị xóa.'
      : 'Start a new project? Current data will be cleared.')) return;
  }
  localStorage.removeItem(STORAGE_KEY);
  // Reset to defaults
  Object.assign(state, {
    step: 1, projectName: '', structure: 'function',
    systems: { lt:true, pres:true, sht:true, hvac:true, sec:true, scn:true, av:false, nrg:false, sys:false },
    ltSubs:  { onoff:true, dim:true, cct:true, rgb:true, facade:false },
    hvacSubs:{ therm:true, split:true, fcu:false, ufh:false, hp:false },
    floors: [
    ],
    quantities: {}, generatedGAs: [], manualGAs: [],
    floorView: 'chip', gaView: 'tree', gaFilter: 'all',
    exportFormat: 'xml', exportOpts: { dpt:true, desc:false, unused:false, floorFirst:false },
    importedXml: null, _xmlCache: null
  });
  renderAll();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderAll();
});
</script>
