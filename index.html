  <meta name="keywords" content="KNX GA Planner, KNX Group Address, KNX ETS, smart home KNX, địa chỉ nhóm KNX, KNX Việt Nam, KNX Store, lập trình KNX, KNX tool, ETS XML export, KNX HVAC, KNX lighting" />
  <meta name="author" content="KNX Store Vietnam — knxstore.vn" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tool.knxstore.vn/" />

  <!-- ── Open Graph (Facebook / Zalo / LinkedIn) ─────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://tool.knxstore.vn/" />
  <meta property="og:site_name"   content="KNX Store Vietnam" />
  <meta property="og:title"       content="KNX GA Planner — Lập địa chỉ Group Address KNX tự động" />

  <meta property="og:image"       content="https://tool.knxstore.vn/assets/og-cover.png" />

  <!-- ── Twitter Card ────────────────────────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="KNX GA Planner — Lập địa chỉ Group Address KNX tự động" />
  <meta name="twitter:description" content="Tự động sinh Group Address KNX, export ETS XML & CSV. Miễn phí tại tool.knxstore.vn" />
  <meta name="twitter:image"       content="https://tool.knxstore.vn/assets/og-cover.png" />

  <!-- ── Structured Data (JSON-LD) ───────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "KNX GA Planner",
    "url": "https://tool.knxstore.vn/",
    "description": "Công cụ lập kế hoạch Group Address KNX tự động — sinh địa chỉ 3 cấp, export ETS XML và CSV cho hệ thống smart home KNX.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web Browser",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "VND" },
    "publisher": {
      "@type": "Organization",
      "name": "KNX Store Vietnam",
      "url": "https://knxstore.vn"
    },
    "keywords": "KNX, Group Address, ETS, smart home, GA Planner, KNX Việt Nam"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <button class="btn-hamburger" id="btn-hamburger" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>
    <div class="header-brand">
      <img src="./assets/logo.png" alt="KNX GA Planner" class="header-logo" />
    </div>
    <div class="header-sep"></div>
    <div class="header-project" id="header-project" style="display:none">
      Project: <span id="header-project-name"></span>
    </div>
    <span id="save-indicator">✓ Saved</span>
    <button class="btn-lang" id="btn-lang" onclick="setLang(state.lang==='en'?'vi':'en')">VI</button>
  </header>

  <!-- Step bar -->
  <nav id="stepbar"></nav>

  <!-- Workspace -->
  <div id="workspace">
    <aside id="sidebar"></aside>
    <main id="panel"></main>
  </div>


</div>

<!-- Sidebar backdrop (mobile) -->
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- Import XML modal -->
<div class="modal-overlay hidden" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-import">Import XML</span>
      <button class="modal-close" onclick="document.getElementById('import-modal').classList.add('hidden')">×</button>
    </div>
    <div
      class="drop-zone"
      id="drop-zone"
      onclick="document.getElementById('file-input').click()"
    >
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-text" id="drop-zone-text">Click or drag ETS XML file here</div>
    </div>
    <input type="file" id="file-input" accept=".xml" style="display:none" />
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('import-modal').classList.add('hidden')" id="btn-cancel-import">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-import" disabled>Import</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">Generating GAs…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="assets/engine.js"></script>
<script src="assets/state.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/render.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
