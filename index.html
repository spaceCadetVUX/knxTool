<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KNX GA Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --teal-50:  #f0fdfa;
      --teal-100: #ccfbf1;
      --teal-200: #99f6e4;
      --teal-300: #5eead4;
      --teal-400: #2dd4bf;
      --teal-500: #14b8a6;
      --teal-600: #0d9488;
      --teal-700: #0f766e;
      --teal-800: #115e59;
      --teal-900: #134e4a;

      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;

      --accent:   var(--teal-600);
      --accent-h: var(--teal-700);
      --accent-l: var(--teal-50);

      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 16px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
      --shadow:    0 2px 8px rgba(0,0,0,.10);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.12);

      --header-h:  60px;
      --sidebar-w: 280px;
      --bottom-h:  64px;
      --step-h:    52px;
    }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      color: var(--gray-800);
      background: var(--gray-50);
      overflow: hidden;
    }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; font-size: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ── App shell ──────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--gray-900);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px;
    }
    .header-brand .logo-knx {
      background: var(--teal-500);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 4px;
    }
    .header-sep { flex: 1; }
    .header-project {
      font-size: 13px;
      color: var(--gray-300);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header-project span {
      color: #fff;
      font-weight: 500;
      margin-left: 4px;
    }
    .btn-lang {
      background: transparent;
      border: 1px solid var(--gray-600);
      color: var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      transition: all .15s;
    }
    .btn-lang:hover {
      border-color: var(--teal-400);
      color: var(--teal-300);
    }

    /* ── Step bar ───────────────────────────────────────────────────────────── */
    #stepbar {
      height: var(--step-h);
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      border: none;
      background: transparent;
    }
    .step-item:hover { color: var(--gray-700); background: var(--gray-100); }
    .step-item.active { color: var(--accent); background: var(--teal-50); }
    .step-item.done { color: var(--gray-600); }
    .step-item.done:hover { color: var(--gray-800); }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--gray-200);
      color: var(--gray-500);
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-item.active .step-num {
      background: var(--accent);
      color: #fff;
    }
    .step-item.done .step-num {
      background: var(--teal-100);
      color: var(--teal-700);
    }
    .step-arrow {
      color: var(--gray-300);
      font-size: 12px;
      user-select: none;
    }

    /* ── Workspace ──────────────────────────────────────────────────────────── */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--gray-100);
    }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--gray-400);
      margin-bottom: 10px;
    }
    .sidebar-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--gray-600);
      padding: 3px 0;
    }
    .sidebar-summary-row strong { color: var(--gray-800); }
    .sidebar-stat {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--teal-600);
    }
    .stat-label { font-size: 12px; color: var(--gray-500); }

    /* ── Main panel ─────────────────────────────────────────────────────────── */
    #panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Bottom bar ─────────────────────────────────────────────────────────── */
    #bottombar {
      height: var(--bottom-h);
      background: #fff;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    /* ── Buttons ────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      border: none;
      transition: all .15s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-ghost {
      background: transparent;
      color: var(--gray-600);
      border: 1px solid transparent;
    }
    .btn-ghost:hover { background: var(--gray-100); border-color: var(--gray-200); }
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .btn-icon {
      background: transparent;
      border: none;
      color: var(--gray-400);
      padding: 4px;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .btn-icon:hover { color: var(--gray-700); background: var(--gray-100); }
    .btn-icon.danger:hover { color: #dc2626; background: #fee2e2; }

    /* ── Cards ──────────────────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
    }
    .card.selected {
      border-color: var(--accent);
      background: var(--teal-50);
    }

    /* ── Chips ──────────────────────────────────────────────────────────────── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-600);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--teal-300); color: var(--teal-700); }
    .chip.active {
      background: var(--teal-100);
      border-color: var(--teal-400);
      color: var(--teal-800);
    }
    .chip-remove {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      opacity: .6;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .chip-remove:hover { opacity: 1; }

    /* ── Inputs ─────────────────────────────────────────────────────────────── */
    .input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--gray-800);
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .input-sm { padding: 5px 9px; font-size: 12px; }
    .input-inline {
      border: 1px solid var(--teal-400);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 13px;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(13,148,136,.15);
    }
    select.input { appearance: auto; }
    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 5px;
    }
    .field { margin-bottom: 14px; }

    /* ── Toggle ─────────────────────────────────────────────────────────────── */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--gray-300);
      border-radius: 20px;
      transition: .2s;
      cursor: pointer;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
    }
    .toggle-label { font-size: 13px; color: var(--gray-700); }

    /* ── Badge ──────────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-teal { background: var(--teal-100); color: var(--teal-800); }
    .badge-gray { background: var(--gray-100); color: var(--gray-600); }
    .badge-red  { background: #fee2e2; color: #dc2626; }

    /* ── Step 1 — Structure ─────────────────────────────────────────────────── */
    .structure-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .structure-card {
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all .15s;
    }
    .structure-card:hover { border-color: var(--teal-300); }
    .structure-card.selected { border-color: var(--accent); background: var(--teal-50); }
    .structure-card .sc-icon { font-size: 28px; margin-bottom: 10px; }
    .structure-card .sc-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .structure-card .sc-desc { font-size: 12px; color: var(--gray-500); }

    /* ── Step 2 — Systems ───────────────────────────────────────────────────── */
    .systems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .sys-card {
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .sys-card:hover { border-color: var(--teal-300); }
    .sys-card.active { border-color: var(--accent); background: var(--teal-50); }
    .sys-card .sys-icon { font-size: 24px; margin-bottom: 6px; }
    .sys-card .sys-name { font-size: 12px; font-weight: 600; color: var(--gray-700); }
    .sys-card .sys-main { font-size: 11px; color: var(--gray-400); }
    .sub-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .ga-preview { font-family: var(--font-mono); font-size: 11px; color: var(--gray-600); }
    .ga-preview-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .ga-preview-row:last-child { border-bottom: none; }
    .ga-addr { color: var(--teal-700); font-weight: 500; min-width: 40px; }
    .ga-dpt { color: var(--gray-400); }
    .ga-type-ctrl { color: #3b82f6; }
    .ga-type-fb   { color: var(--gray-400); }

    /* ── Step 3 — Floors (compact style block) ──────────────────────────────── */
    .floor-grid { display: flex; flex-direction: column; gap: 10px; }
    .room-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── Step 4 — Quantities ────────────────────────────────────────────────── */
    .qty-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .qty-table th {
      text-align: left;
      padding: 8px 10px;
      background: var(--gray-50);
      border-bottom: 2px solid var(--gray-200);
      font-weight: 600;
      color: var(--gray-600);
      font-size: 12px;
    }
    .qty-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .qty-table tr:hover td { background: var(--gray-50); }
    .qty-input {
      width: 60px;
      text-align: center;
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
    }
    .qty-input:focus { border-color: var(--accent); outline: none; }

    /* ── Step 5 — GA List ───────────────────────────────────────────────────── */
    .stat-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-card .val {
      font-size: 28px;
      font-weight: 700;
      color: var(--teal-600);
      line-height: 1;
    }
    .stat-card .lbl { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .ga-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .ga-tree { font-size: 13px; }
    .ga-main-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--gray-800);
      color: #fff;
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      cursor: pointer;
    }
    .ga-main-name { font-weight: 600; font-size: 13px; }
    .ga-mid-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px 6px 24px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      margin-bottom: 2px;
      cursor: pointer;
    }
    .ga-mid-name { font-weight: 600; color: var(--gray-700); }
    .ga-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px 5px 40px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .ga-row:hover { background: var(--gray-50); }
    .ga-row .addr { color: var(--teal-700); font-weight: 500; min-width: 50px; }
    .ga-row .name { flex: 1; color: var(--gray-700); }
    .ga-row .dpt  { color: var(--gray-400); font-size: 11px; }
    .ga-row .type { font-size: 10px; }
    .ga-row .actions { display: flex; gap: 4px; opacity: 0; transition: opacity .1s; }
    .ga-row:hover .actions { opacity: 1; }
    .ga-table-wrap { overflow-x: auto; }
    .ga-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .ga-table th {
      padding: 7px 10px;
      background: var(--gray-50);
      border-bottom: 2px solid var(--gray-200);
      font-weight: 600;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .ga-table td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .ga-table tr:hover td { background: var(--gray-50); }
    .add-manual-form {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px 8px 40px;
      background: var(--teal-50);
      border-radius: var(--radius-sm);
      margin-top: 4px;
    }
    .add-manual-form .input { padding: 4px 8px; font-size: 12px; }

    /* ── Step 6 — Export ────────────────────────────────────────────────────── */
    .export-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }
    .export-panel .card { height: 100%; }
    .format-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .format-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--gray-50);
      font-weight: 600;
      font-size: 13px;
      color: var(--gray-500);
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .format-btn.active {
      border-color: var(--accent);
      background: var(--teal-50);
      color: var(--accent);
    }
    .xml-preview {
      background: var(--gray-900);
      color: #e2e8f0;
      font-family: var(--font-mono);
      font-size: 11px;
      border-radius: var(--radius);
      padding: 16px;
      overflow: auto;
      max-height: 420px;
      white-space: pre;
      tab-size: 2;
    }
    .xml-preview .tag   { color: #7dd3fc; }
    .xml-preview .attr  { color: #86efac; }
    .xml-preview .val   { color: #fde68a; }
    .xml-preview .cmt   { color: #94a3b8; font-style: italic; }
    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .preview-title { font-weight: 600; font-size: 13px; color: var(--gray-700); }

    /* ── Import modal ───────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 480px;
      max-width: calc(100vw - 40px);
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--gray-400);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .modal-close:hover { color: var(--gray-700); background: var(--gray-100); }
    .drop-zone {
      border: 2px dashed var(--gray-300);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--gray-400);
      cursor: pointer;
      transition: all .15s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--teal-400);
      background: var(--teal-50);
      color: var(--teal-600);
    }
    .drop-zone-icon { font-size: 32px; margin-bottom: 10px; }
    .drop-zone-text { font-size: 13px; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    /* ── Loading overlay ────────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 900;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 14px; color: var(--gray-500); }

    /* ── Toast ──────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gray-900);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 800;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.toast-error { background: #dc2626; }

    /* ── Misc utils ─────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .text-sm { font-size: 12px; }
    .text-muted { color: var(--gray-400); }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    .section-desc { font-size: 13px; color: var(--gray-500); margin-bottom: 18px; }
    .divider { height: 1px; background: var(--gray-100); margin: 12px 0; }

    /* ── Step 2 — Two col layout ─────────────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      align-items: start;
    }
    .ga-set-preview {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      position: sticky;
      top: 0;
    }
    .ga-set-empty {
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
      padding: 24px 0;
    }
    .ga-set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 12px;
    }
    .ga-set-row:last-child { border-bottom: none; }
    .ga-offset { font-family: var(--font-mono); color: var(--gray-400); min-width: 30px; font-size: 11px; }
    .ga-set-name { flex: 1; color: var(--gray-700); }
    .ga-type-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
    }
    .ga-type-badge.ctrl { background: #dbeafe; color: #1d4ed8; }
    .ga-type-badge.fb   { background: var(--gray-100); color: var(--gray-500); }
    .sel-count { font-size: 12px; color: var(--gray-500); }

    /* ── View toggle (Step 2/3) ──────────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 3px;
    }
    .vt-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-500);
      cursor: pointer;
      transition: all .15s;
    }
    .vt-btn.active { background: #fff; color: var(--gray-800); box-shadow: var(--shadow-sm); }

    /* ── Step 3 — Floor builder ─────────────────────────────────────────────── */
    .floors-list { display: flex; flex-direction: column; gap: 12px; }
    .floor-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .floor-card:focus-within { box-shadow: 0 0 0 2px rgba(13,148,136,.15); border-color: var(--teal-300); }
    .floor-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }
    .floor-card-header.fixed-floor { background: var(--teal-50); }
    .mid-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 22px;
      font-size: 10px;
      font-weight: 700;
      padding: 0 7px;
      border-radius: 10px;
      background: var(--teal-100);
      color: var(--teal-800);
      flex-shrink: 0;
    }
    .floor-name-field {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      outline: none;
      min-width: 0;
    }
    .floor-name-field:focus {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 0 0 2px rgba(13,148,136,.2);
      padding: 2px 6px;
      margin: -2px -6px;
    }
    .floor-room-count {
      font-size: 11px;
      color: var(--gray-400);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .floor-card-body { padding: 12px 14px; }
    .room-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .room-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      font-size: 12px;
      color: var(--gray-700);
      cursor: default;
      transition: background .1s;
    }
    .room-tag:hover { background: var(--gray-200); }
    .room-tag.fixed-room { background: var(--teal-50); border-color: var(--teal-200); color: var(--teal-800); }
    .room-tag-del {
      background: none;
      border: none;
      padding: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: var(--gray-400);
      cursor: pointer;
      transition: all .1s;
      flex-shrink: 0;
    }
    .room-tag-del:hover { background: #fecaca; color: #dc2626; }
    .room-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-50);
      border: 1px dashed var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      transition: all .15s;
    }
    .room-add-row:focus-within {
      background: #fff;
      border-color: var(--teal-400);
      border-style: solid;
      box-shadow: 0 0 0 2px rgba(13,148,136,.12);
    }
    .room-add-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      color: var(--gray-800);
      outline: none;
    }
    .room-add-input::placeholder { color: var(--gray-400); }
    .room-add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }
    .room-add-row:focus-within .room-add-btn { opacity: 1; }
    .add-floor-btn {
      margin-top: 4px;
      background: transparent;
      border: 2px dashed var(--gray-200);
      border-radius: var(--radius);
      padding: 12px;
      width: 100%;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-floor-btn:hover { border-color: var(--teal-400); color: var(--teal-600); background: var(--teal-50); }

    /* ── Step 3 — Room inline rename ────────────────────────────────────────── */
    .room-tag-rename {
      border: none; background: transparent; outline: none;
      font-size: 12px; color: var(--gray-800);
      min-width: 40px; max-width: 160px;
    }
    .room-tag.editing { background: #fff; border-color: var(--teal-400);
      box-shadow: 0 0 0 2px rgba(13,148,136,.15); }

    /* ── Step 3 — Tree view ──────────────────────────────────────────────────── */
    .tree-list { display: flex; flex-direction: column; gap: 4px; }
    .tree-floor-node { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--gray-200); background: #fff; }
    .tree-floor-node:focus-within { border-color: var(--teal-300); box-shadow: 0 0 0 2px rgba(13,148,136,.1); }
    .tree-floor-hd {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px;
      background: var(--gray-50);
      border-bottom: 1px solid transparent;
      cursor: pointer; user-select: none;
    }
    .tree-floor-hd.open { border-bottom-color: var(--gray-100); }
    .tree-caret {
      font-size: 10px; color: var(--gray-400);
      transition: transform .15s; flex-shrink: 0;
    }
    .tree-caret.open { transform: rotate(90deg); }
    .tree-floor-body { padding: 6px 12px 10px 36px; }
    .tree-room-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; border-radius: var(--radius-sm);
      font-size: 13px; color: var(--gray-700);
      position: relative;
    }
    .tree-room-row:hover { background: var(--gray-100); }
    .tree-room-row::before {
      content: ''; position: absolute; left: -16px; top: 50%;
      width: 10px; height: 1px; background: var(--gray-300);
    }
    .tree-room-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-room-rename-inp {
      flex: 1; border: 1px solid var(--teal-400); border-radius: 4px;
      padding: 1px 6px; font-size: 13px; outline: none;
      background: #fff; color: var(--gray-800);
    }
    .tree-room-actions { display: none; gap: 2px; flex-shrink: 0; }
    .tree-room-row:hover .tree-room-actions { display: flex; }
    .tree-icon-btn {
      background: none; border: none; padding: 2px 4px; border-radius: 3px;
      cursor: pointer; font-size: 12px; color: var(--gray-400);
      line-height: 1;
    }
    .tree-icon-btn:hover { background: var(--gray-200); color: var(--gray-700); }
    .tree-icon-btn.danger:hover { background: #fecaca; color: #dc2626; }
    .tree-add-room {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; margin-top: 4px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--gray-300); background: var(--gray-50);
      font-size: 12px; color: var(--gray-400);
      transition: all .15s;
    }
    .tree-add-room:focus-within {
      border-color: var(--teal-400); border-style: solid;
      background: #fff; color: var(--gray-700);
      box-shadow: 0 0 0 2px rgba(13,148,136,.1);
    }
    .tree-add-room-inp {
      flex: 1; border: none; background: transparent;
      font-size: 12px; outline: none; color: var(--gray-800);
    }
    .tree-add-room-inp::placeholder { color: var(--gray-400); }
    .tree-connector { position: relative; }
    .tree-connector::before {
      content: ''; position: absolute;
      left: -16px; top: 0; bottom: 0;
      width: 1px; background: var(--gray-200);
    }

    /* Step 3 empty state */
    .floors-empty {
      text-align: center; padding: 48px 24px;
      border: 2px dashed var(--gray-200); border-radius: var(--radius);
      color: var(--gray-400);
    }
    .floors-empty-icon { font-size: 32px; margin-bottom: 12px; }
    .floors-empty p { font-size: 13px; margin: 0 0 16px; }

    /* ── Step 4 — Assign layout ─────────────────────────────────────────────── */
    .assign-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 16px;
      align-items: start;
    }
    .assign-left {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .assign-floor-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: var(--gray-700);
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      text-align: left;
      transition: background .1s;
    }
    .assign-floor-btn:hover { background: var(--gray-50); }
    .assign-floor-btn.active { background: var(--teal-50); color: var(--teal-800); font-weight: 600; }
    .assign-floor-btn:last-child { border-bottom: none; }
    .room-tab-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .room-tab {
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gray-200);
      background: #fff;
      font-size: 12px;
      color: var(--gray-600);
      cursor: pointer;
      transition: all .15s;
    }
    .room-tab:hover { border-color: var(--teal-300); }
    .room-tab.active { border-color: var(--accent); background: var(--teal-50); color: var(--teal-800); font-weight: 600; }
    .room-qty-area {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 12px;
    }
    .sys-section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 6px;
      margin-top: 8px;
      border-bottom: 2px solid var(--gray-200);
      margin-bottom: 2px;
    }
    .sys-section-head:first-child { margin-top: 0; }
    .sys-section-icon { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
    .sys-section-icon svg { width: 100%; height: 100%; }
    .sys-section-label { font-weight: 600; font-size: 13px; flex: 1; }
    .qty-sum-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--teal-100);
      color: var(--teal-800);
      font-weight: 600;
    }
    .qty-sum-badge.zero { background: var(--gray-100); color: var(--gray-400); }
    .qty-stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .qty-stepper-btn {
      width: 24px; height: 24px;
      border-radius: 4px;
      border: 1px solid var(--gray-300);
      background: var(--gray-50);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gray-600);
      transition: all .1s;
    }
    .qty-stepper-btn:hover { border-color: var(--teal-400); color: var(--teal-700); background: var(--teal-50); }

    /* ── Sidebar styles ──────────────────────────────────────────────────────── */
    .sb-section { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); }
    .sb-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-400); margin-bottom: 8px; }
    .sb-step-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 8px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--gray-500);
      cursor: pointer;
      text-align: left;
      transition: all .1s;
    }
    .sb-step-btn:hover { background: var(--gray-100); color: var(--gray-800); }
    .sb-step-btn.active { background: var(--teal-50); color: var(--teal-800); font-weight: 600; }
    .sb-step-btn.done { color: var(--gray-600); }
    .sb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gray-300);
      flex-shrink: 0;
    }
    .sb-step-btn.active .sb-dot { background: var(--accent); }
    .sb-step-btn.done .sb-dot { background: var(--teal-300); }
    .sb-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--gray-600);
      padding: 3px 0;
    }
    .sb-info-row strong { color: var(--gray-800); }
    .sb-sys-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .sb-sys-chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--teal-100);
      color: var(--teal-800);
      font-weight: 600;
    }

    /* ── Save indicator ─────────────────────────────────────────────────────── */
    #save-indicator {
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-600);
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
    }
    #save-indicator.saved { opacity: 1; color: var(--teal-400); }

    /* ── GA name editing ─────────────────────────────────────────────────────── */
    .ga-name-text { cursor: text; flex: 1; }
    .ga-name-input { display: none; flex: 1; }
    .ga-name-input.visible { display: block; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="header-brand">
      <span class="logo-knx">KNX</span>
      GA Planner
    </div>
    <div class="header-sep"></div>
    <div class="header-project" id="header-project" style="display:none">
      Project: <span id="header-project-name"></span>
    </div>
    <span id="save-indicator">✓ Saved</span>
    <button class="btn-lang" id="btn-lang" onclick="setLang(state.lang==='en'?'vi':'en')">VI</button>
  </header>

  <!-- Step bar -->
  <nav id="stepbar"></nav>

  <!-- Workspace -->
  <div id="workspace">
    <aside id="sidebar"></aside>
    <main id="panel"></main>
  </div>

  <!-- Bottom bar -->
  <footer id="bottombar">
    <button class="btn btn-ghost" id="btn-back" onclick="goStep(state.step-1)">← Back</button>
    <button class="btn btn-primary" id="btn-next" onclick="goStep(state.step+1)">Next →</button>
  </footer>

</div>

<!-- Import XML modal -->
<div class="modal-overlay hidden" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-import">Import XML</span>
      <button class="modal-close" onclick="document.getElementById('import-modal').classList.add('hidden')">×</button>
    </div>
    <div
      class="drop-zone"
      id="drop-zone"
      onclick="document.getElementById('file-input').click()"
    >
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-text" id="drop-zone-text">Click or drag ETS XML file here</div>
    </div>
    <input type="file" id="file-input" accept=".xml" style="display:none" />
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('import-modal').classList.add('hidden')" id="btn-cancel-import">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-import" disabled>Import</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">Generating GAs…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  lang: 'en',
  step: 1,
  projectName: '',
  structure: 'function',
  systems: { lt:true, pres:true, sht:true, hvac:true, sec:true, scn:true, av:false, nrg:false, sys:false },
  ltSubs:   { onoff:true, dim:true, cct:true, rgb:true, facade:false },
  hvacSubs: { therm:true, split:true, fcu:false, ufh:false, hp:false },
  floors: [],
  quantities:    {},
  generatedGAs:  [],
  manualGAs:     [],
  floorView:     'chip',
  gaView:        'tree',
  gaFilter:      'all',
  exportFormat:  'xml',
  exportOpts:    { dpt:true, desc:false, unused:false, floorFirst:false },
  importedXml:   null
};

// ── i18n ───────────────────────────────────────────────────────────────────────
const i18n = {
  en: {
    steps: ['Structure','Systems','Floors & Rooms','Assign','Generate & Review','Export'],
    step1_title: 'Project setup',
    step1_desc:  'Choose a GA structure type and name your project.',
    step2_title: 'Select systems',
    step2_desc:  'Choose which systems are in this project. Click a card to preview its GA set.',
    step3_title: 'Floors & rooms',
    step3_desc:  'Each floor maps to one middle group (0–7). Add rooms within each floor.',
    step4_title: 'Assign systems & quantities',
    step4_desc:  'Enter the number of each circuit type per room.',
    step5_title: 'Generated group addresses',
    step5_desc:  'Review and edit before export.',
    step6_title: 'Export',

// Return only circuit defs enabled by sub-type selections
function activeDefs(sk) {
  const all = circuitDefs[sk] || [];
  if (sk === 'lt')   return all.filter(([ck]) => state.ltSubs[ck]);
  if (sk === 'hvac') return all.filter(([ck]) => state.hvacSubs[ck]);
  return all;
}

// ── Quantity helpers ──────────────────────────────────────────────────────────
function getQty(fi, ri, sk, ck) {
  return ((state.quantities[fi] || {})[ri] || {})[sk]?.[ck] || 0;
}

function setQty(fi, ri, sk, ck, val) {
  if (!state.quantities[fi])         state.quantities[fi] = {};
  if (!state.quantities[fi][ri])     state.quantities[fi][ri] = {};
  if (!state.quantities[fi][ri][sk]) state.quantities[fi][ri][sk] = {};
  state.quantities[fi][ri][sk][ck] = Math.max(0, parseInt(val) || 0);
  debouncedSave();
}

function adjQty(fi, ri, sk, ck, delta) {
  setQty(fi, ri, sk, ck, getQty(fi, ri, sk, ck) + delta);
  renderPanel();
}

// ── Core render ───────────────────────────────────────────────────────────────
function renderAll() {
  renderStepBar();
  renderSidebar();
  renderPanel();
  renderBottomBar();

  // Update header project badge
  const hp = document.getElementById('header-project');
  const hn = document.getElementById('header-project-name');
  if (state.projectName) {
    hp.style.display = '';
    hn.textContent = state.projectName;
  } else {
    hp.style.display = 'none';
  }
}

function renderStepBar() {
  const labels = t('steps');
  let html = '';
  for (let i = 1; i <= 6; i++) {
    const cls = i === state.step ? 'active' : (i < state.step ? 'done' : '');
    const num = i < state.step ? '✓' : i;
    html += `<button class="step-item ${cls}" onclick="goStep(${i})">
      <div class="step-num">${num}</div>
      ${Array.isArray(labels) ? labels[i-1] : ''}
    </button>`;
    if (i < 6) html += '<div class="step-arrow">›</div>';
  }
  document.getElementById('stepbar').innerHTML = html;
}

function renderSidebar() {
  const labels = t('steps');
  const selSystems = Object.keys(state.systems).filter(k => state.systems[k]);
  let html = '';

  // Step navigation
  html += '<div class="sb-section"><div class="sb-label">Steps</div>';
  for (let i = 1; i <= 6; i++) {
    const cls = i === state.step ? 'active' : (i < state.step ? 'done' : '');
    html += `<button class="sb-step-btn ${cls}" onclick="goStep(${i})">
      <div class="sb-dot"></div>${Array.isArray(labels) ? labels[i-1] : ''}
    </button>`;
  }
  html += '</div>';

  // Project info
  html += '<div class="sb-section">';
  html += '<div class="sb-label">Project</div>';
  html += `<div class="sb-info-row"><span>Name</span><strong>${state.projectName || '—'}</strong></div>`;
  html += `<div class="sb-info-row"><span>Structure</span><strong>${state.structure === 'function' ? t('function_based') : t('building_based')}</strong></div>`;
  html += `<div class="sb-info-row"><span>${t('floors')}</span><strong>${state.floors.length}</strong></div>`;
  html += '</div>';

  // Selected systems
  if (selSystems.length) {
    html += '<div class="sb-section">';
    html += `<div class="sb-label">Systems (${selSystems.length})</div>`;
    html += '<div class="sb-sys-chips">';
    selSystems.forEach(sk => {
      const si = sysInfo[sk];
      html += `<span class="sb-sys-chip">${si['name_' + state.lang] || si.name_en}</span>`;
    });
    html += '</div></div>';
  }

  // GA count if generated
  if (state.generatedGAs.length) {
    html += '<div class="sb-section">';
    html += `<div class="sb-label">${t('total_gas')}</div>`;
    html += `<div style="font-size:24px;font-weight:700;color:var(--teal-600)">${state.generatedGAs.length}</div>`;
    html += '</div>';
  }

  // New project button
  html += `<div class="sb-section" style="margin-top:auto">
    <button class="btn btn-ghost btn-sm" style="width:100%;color:var(--gray-500)"
      onclick="newProject()">
      ${state.lang === 'vi' ? '🗑 Dự án mới' : '🗑 New project'}
    </button>
  </div>`;

  document.getElementById('sidebar').innerHTML = html;
}

function renderPanel() {
  const renders = [null, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6];
  const fn = renders[state.step];
  document.getElementById('panel').innerHTML = fn ? fn() : '';
}

function renderBottomBar() {
  const back = document.getElementById('btn-back');
  const next = document.getElementById('btn-next');

  back.style.visibility = state.step === 1 ? 'hidden' : '';
  back.textContent = t('prev');

  const nextLabels = {
    1: t('next_systems'), 2: t('next_floors'), 3: t('next_assign'),
    4: t('next_generate'), 5: t('next_export'), 6: ''
  };
  next.textContent = nextLabels[state.step] || 'Next →';
  next.style.display = state.step === 6 ? 'none' : '';
}

function goStep(n) {
  if (n < 1 || n > 6) return;
  state.step = n;
  renderAll();
  if (n === 5 && state.generatedGAs.length === 0) callGenerate();
  if (n === 6 && state.generatedGAs.length > 0)  loadXmlPreview();
}
